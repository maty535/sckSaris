<div class="google-album-wrapper" style="text-align: center; margin: 20px 0;">
  <a href="{{ page.album_url }}" target="_blank" rel="noopener" class="album-link">
    <div class="album-card" style="position: relative; display: inline-block; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
      <img src="{{ page.album_cover }}" alt="Titulná fotka albumu" style="max-width: 100%; height: auto; border-radius: 4px; display: block; max-height: 400px;">
      <div class="album-overlay" style="margin-top: 10px; font-weight: bold; color: #333;">
        📸 Otvoriť celý album na Google Foto
      </div>
    </div>
  </a>
</div>
